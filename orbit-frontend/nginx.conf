# Frontend - HTTP redirect to HTTPS
server {
    listen 80;
    server_name megagamers254.com www.megagamers254.com 31.97.197.116;
    return 301 https://$server_name$request_uri;
}

# Frontend - HTTPS
server {
    listen 443 ssl http2;
    server_name megagamers254.com www.megagamers254.com 31.97.197.116;

    # SSL certificates
    ssl_certificate /etc/letsencrypt/live/megagamers254.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/megagamers254.com/privkey.pem;
    
    root /var/www/megagamers/mega-gamers-frontend/dist;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Handle React/Vite routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location /assets {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
}

# API - HTTP redirect to HTTPS
server {
    listen 80;
    server_name api.megagamers254.com;
    return 301 https://$server_name$request_uri;
}

# API - HTTPS
server {
    listen 443 ssl http2;
    server_name api.megagamers254.com;

    ssl_certificate /etc/letsencrypt/live/megagamers254.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/megagamers254.com/privkey.pem;

    location / {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        client_max_body_size 50M;
    }

    location /socket.io/ {
        proxy_pass http://localhost:5000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
        proxy_buffering off;
    }

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
}