# Authentication
default_user = admin
default_pass = admin123

# Logging
log.file.level = info

# Connection settings
channel_max = 2047
frame_max = 131072
heartbeat = 60

# Queue settings
queue_master_locator = min-masters
default_vhost = /

# Management plugin
management.tcp.port = 15672
management.load_definitions = /etc/rabbitmq/definitions.json